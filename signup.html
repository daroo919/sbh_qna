<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    .error {
      color: red;
    }

    .input-wrap {
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 10px;
      top: 10px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>

<body>

  <h2>회원가입</h2>

  <input id="email" placeholder="이메일 입력">

  <div class="input-wrap">
    <input id="password" type="password" placeholder="비밀번호 (6자리 이상)">
    <span id="togglePassword1" class="toggle">👁</span>
  </div>

  <div class="input-wrap">
    <input id="passwordConfirm" type="password" placeholder="비밀번호 확인">
    <span id="togglePassword2" class="toggle">👁</span>
  </div>

  <input id="nickname" placeholder="닉네임">
  <input id="realname" placeholder="본명">
  <input id="studentid" placeholder="학번">

  <p class="error" id="errorMsg"></p>

  <button id="btnSignup">회원가입</button>

  <p><a href="login.html">로그인으로 이동</a></p>

  <script type="module" src="/sbh_qna/js/signup.js"></script>

</body>

</html>
