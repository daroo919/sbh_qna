<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 메인</title>
  <style>
    /* 기존 배경 및 애니메이션 스타일 그대로 유지 */
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); background-size: 400% 400%; animation: gradientMove 20s ease infinite; min-height: 100vh; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.4); position: sticky; top:0; z-index:100; }
    .logo { font-size: 24px; font-weight: 700; color: #0f172a; cursor: pointer; user-select: none; }
    .dot { color: #2563eb; }
    .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; }
    .points { color: #2563eb; font-weight: 600; }
    .logout { cursor: pointer; padding: 6px 10px; border-radius: 8px; background: rgba(255, 255, 255, 0.6); }

    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; padding-top: 20px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); }
    .menu-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; }
    .menu-item:hover { background: rgba(255, 255, 255, 0.6); color: #2563eb; }

    /* 메인 카드 스타일 */
    .main { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .welcome-box { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.4); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    
    /* 신분 표시 태그 추가 */
    .role-tag { font-size: 12px; font-weight: bold; color: white; padding: 3px 10px; border-radius: 50px; margin-bottom: 10px; display: inline-block; }
    .role-student { background: #64748b; }
    .role-teacher { background: #f59e0b; }
    .role-admin { background: #ef4444; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points" id="headerPoints">0P</div>
      <div class="nickname" id="headerNickname" style="cursor:pointer" onclick="location.href='mypage.html'">불러오는 중...</div>
      <div class="logout" onclick="handleLogout()">로그아웃</div>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
      <div class="menu-item" onclick="location.href='mypage.html'">⚙️ 마이페이지</div> </div>

    <div class="main">
      <div class="welcome-box">
        <div id="roleDisplay" class="role-tag">로딩 중...</div> <h1 style="margin: 10px 0;">반갑습니다, <span id="userNickname">사용자</span>님!</h1>
        <p style="color: #475569;">오늘도 지식을 나누고 성장하는 하루 되세요.</p>
        <div style="margin-top: 20px; font-size: 14px; color: #2563eb; font-weight: bold;">
          내 포인트: <span id="currentPoints">0</span> P
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";
      
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        const data = snap.data();
        const role = data.role || "student"; // 기본값 학생
        const badge = data.currentBadge || "";
        const nickname = data.nickname;

        // 1. 헤더 정보 업데이트
        document.getElementById("headerNickname").innerText = (badge + " " + nickname).trim();
        document.getElementById("headerPoints").innerText = (data.points || 0) + "P";

        // 2. 메인 화면 정보 업데이트
        document.getElementById("userNickname").innerText = nickname;
        document.getElementById("currentPoints").innerText = (data.points || 0);

        // 3. 신분(계급) 태그 스타일 적용
        const roleEl = document.getElementById("roleDisplay");
        roleEl.className = `role-tag role-${role}`;
        roleEl.innerText = role === "admin" ? "관리자" : (role === "teacher" ? "선생님" : "학생");
      }
    });

    window.handleLogout = () => { if(confirm("로그아웃 하시겠습니까?")) signOut(auth); };
  </script>
</body>
</html>
