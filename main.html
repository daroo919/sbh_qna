<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 메인</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); background-size: 400% 400%; animation: gradientMove 20s ease infinite; min-height: 100vh; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.4); position: sticky; top:0; z-index:100; }
    .logo { font-size: 24px; font-weight: 700; color: #0f172a; cursor: pointer; user-select: none; }
    .dot { color: #2563eb; }
    .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; }
    .points { color: #2563eb; font-weight: 600; }
    .logout { cursor: pointer; padding: 6px 10px; border-radius: 8px; background: rgba(255, 255, 255, 0.6); transition: 0.2s; }
    .logout:hover { background: rgba(255, 255, 255, 0.9); }
    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; padding-top: 20px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); }
    .menu-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; color: #374151; }
    .menu-item:hover { background: rgba(255, 255, 255, 0.6); color: #2563eb; }
    .main { flex: 1; padding: 30px; }
    .banner { background: rgba(37, 99, 235, 0.9); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
    .notice { background: rgba(255, 255, 255, 0.6); padding: 15px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.4); }
    .card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 16px; padding: 25px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); }
    .card-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    .update-list p { margin: 12px 0; padding-bottom: 10px; border-bottom: 1px dashed rgba(0,0,0,0.05); }
    .update-list b { color: #2563eb; margin-right: 10px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points">0P</div>
      <div class="nickname">불러오는 중...</div>
      <div class="logout">로그아웃</div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item">💰 포인트 관리</div>
    </div>
    <div class="main">
      <div class="banner">📢 환영합니다! 구원(求援)의 최신 소식을 확인하세요.</div>
      <div class="notice"><b>공지</b><br>- 비속어 사용 금지<br>- 학번 공개 금지</div>
      <div class="card">
        <div class="card-title">🚀 업데이트 내역</div>
        <hr style="border: 0; height: 1px; background: rgba(0,0,0,0.1); margin: 15px 0;">
        <div class="update-list">
          <p><b>[2026.03.02]</b> 잡담(talk.html) 기능 및 채택 포인트 시스템 추가</p>
          <p><b>[2026.02.28]</b> 문답 페이지 분리 및 UI 디자인 고도화</p>
          <p><b>[2026.02.15]</b> 베타 서비스 런칭</p>
        </div>
      </div>
    </div>
  </div>
  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";
    const nicknameEl = document.querySelector(".nickname"), pointsEl = document.querySelector(".points"), logoutBtn = document.querySelector(".logout");
    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        nicknameEl.innerText = snap.data().nickname;
        pointsEl.innerText = (snap.data().points || 0) + "P";
      }
    });
    logoutBtn.onclick = async () => { if(confirm("로그아웃 하시겠습니까?")) { await signOut(auth); window.location.href = "login.html"; } };
  </script>
</body>
</html>
