<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 메인</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); background-size: 400% 400%; animation: gradientMove 20s ease infinite; min-height: 100vh; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.4); position: sticky; top:0; z-index:100; }
    .logo { font-size: 24px; font-weight: 700; color: #0f172a; cursor: pointer; user-select: none; }
    .dot { color: #2563eb; }
    .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; }
    .points { color: #2563eb; font-weight: 600; }
    .logout { cursor: pointer; padding: 6px 12px; border-radius: 8px; background: rgba(255, 255, 255, 0.6); transition: 0.2s; font-weight: bold; }
    .logout:hover { background: #fee2e2; color: #ef4444; }
    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; padding-top: 20px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); }
    .menu-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; color: #374151; }
    .menu-item:hover { background: rgba(255, 255, 255, 0.6); color: #2563eb; }
    .main { flex: 1; padding: 30px; }
    .banner { background: rgba(37, 99, 235, 0.9); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; transition: 0.3s; }
    .banner:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
    .notice { background: rgba(255, 255, 255, 0.7); padding: 15px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px); transition: 0.3s; }
    .notice:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.05); }
    .card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 16px; padding: 25px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); transition: 0.3s; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); }
    .role-text { font-size: 11px; font-weight: bold; margin-right: 5px; }
    .role-admin { color: #ef4444; } .role-teacher { color: #f59e0b; } .role-student { color: #64748b; }
    .date-blue { color: #2563eb; font-weight: bold; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points" id="hPoints">0P</div>
      <div class="nickname" id="hNick" style="cursor:pointer" onclick="location.href='mypage.html'">로딩...</div>
      <div class="logout" id="logoutBtn">로그아웃</div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
      <div class="menu-item" onclick="location.href='mypage.html'">⚙️ 마이페이지</div>
    </div>
    <div class="main">
      <div class="banner">📢 환영합니다! 구원(求援)의 최신 소식을 확인하세요.</div>
      <div class="notice"><b>📌 필독 공지사항</b><br><span style="font-size: 14px; color: #475569;">- 비속어 사용 금지 / 학번 공개 금지</span></div>
      <div class="card">
        <h3>🚀 최근 업데이트</h3>
        <p><b class="date-blue">[2026.03.02]</b> 계급 권한 시스템 도입</p>
        <p><b class="date-blue">[2026.03.02]</b> 전 페이지 플로트 효과 및 유리 효과 적용</p>
      </div>
    </div>
  </div>
  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";
    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        const d = snap.data();
        const role = d.role || "student";
        const roleName = role === "admin" ? "관리자" : (role === "teacher" ? "선생님" : "학생");
        document.getElementById("hNick").innerHTML = `<span class="role-text role-${role}">[${roleName}]</span> ${d.currentBadge || ''} ${d.nickname}`;
        document.getElementById("hPoints").innerText = (d.points || 0) + "P";
      }
    });
    document.getElementById("logoutBtn").onclick = () => { if(confirm("로그아웃 하시겠습니까?")) signOut(auth).then(()=>location.href="login.html"); };
  </script>
</body>
</html>
