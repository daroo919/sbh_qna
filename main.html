<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>求援 - 메인</title>
  <link rel="stylesheet" href="style.css"> 
</head>

<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points" id="hPoints">0P</div>
      <div class="nickname" id="hNick" onclick="location.href='mypage.html'">로딩 중...</div>
      <button class="logout" id="logoutBtn">로그아웃</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
      <div class="menu-item" onclick="location.href='mypage.html'">⚙️ 마이페이지</div>
    </aside>

    <main class="main">
      <div class="banner">📢 환영합니다! 구원(求援)의 최신 소식을 확인하세요.</div>

      <div class="notice">
        <b>📌 필독 공지사항</b>
        <span style="font-size: 14px; color: #475569;">- 비속어 사용 금지 / 학번 공개 금지</span>
      </div>

      <div class="card">
        <h3>🚀 최근 업데이트</h3>
        <div class="update-item"><span class="date-blue">[2026.03.02]</span> 전 페이지 모바일 하단 탭 바 적용 및 UI 최적화</div>
        <div class="update-item"><span class="date-blue">[2026.03.02]</span> 로그아웃 버튼 시각화 개선 및 중앙 정렬 보정</div>
        <div class="update-item"><span class="date-blue">[2026.03.02]</span> 공지 및 카드 플로트 효과 최적화</div>
      </div>
    </main>
  </div>

  <nav class="bottom-tab">
    <div class="tab-item" onclick="location.href='qna.html'">
      <span class="tab-icon">📄</span>
      <span>문답</span>
    </div>
    <div class="tab-item" onclick="location.href='talk.html'">
      <span class="tab-icon">👤</span>
      <span>잡담</span>
    </div>
    <div class="tab-item" onclick="location.href='point.html'">
      <span class="tab-icon">💰</span>
      <span>포인트</span>
    </div>
    <div class="tab-item" onclick="location.href='mypage.html'">
      <span class="tab-icon">⚙️</span>
      <span>마이</span>
    </div>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        const d = snap.data();
        const role = d.role || "student";
        const roleName = role === "admin" ? "관리자" : (role === "teacher" ? "선생님" : "학생");
        document.getElementById("hNick").innerHTML = `<span class="role-text role-${role}">[${roleName}]</span> ${d.currentBadge || ''} ${d.nickname}`;
        document.getElementById("hPoints").innerText = (d.points || 0) + "P";

        // 로컬 스토리지에서 이미지 가져오기
        const localBg = localStorage.getItem(`bg_${user.uid}`);
        if (localBg) {
          document.body.style.backgroundImage = `linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), url('${localBg}')`;
        }
      }
    });

    document.getElementById("logoutBtn").onclick = () => {
      if (confirm("로그아웃 하시겠습니까?")) signOut(auth).then(() => location.href = "login.html");
    };
  </script>
</body>

</html>
