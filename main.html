<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>求援</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #dbeafe, #f0f9ff);
  min-height: 100vh;
}

/* ===== 헤더 ===== */
.header {
  height: 70px;
  padding: 0 40px;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  display: flex;
  justify-content: space-between;
  align-items: center;

  border-bottom: 1px solid rgba(255,255,255,0.4);
}

.logo {
  font-size: 24px;
  font-weight: 700;
  color: #0f172a;
}

.dot {
  color: #2563eb;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 14px;
}

.points {
  color: #2563eb;
  font-weight: 600;
}

.nickname {
  color: #374151;
}

.logout {
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.6);
  transition: 0.2s;
}

.logout:hover {
  background: rgba(255,255,255,0.9);
}

/* ===== 레이아웃 ===== */
.layout {
  display: flex;
  min-height: calc(100vh - 70px);
}

.sidebar {
  width: 220px;
  padding-top: 20px;

  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(12px);

  border-right: 1px solid rgba(255,255,255,0.4);
}

.menu-item {
  padding: 15px 20px;
  cursor: pointer;
  color: #374151;
  transition: 0.2s;
}

.menu-item:hover {
  background: rgba(255,255,255,0.6);
}

.main {
  flex: 1;
  padding: 30px;
}

/* ===== 카드 (유리 효과) ===== */
.card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 16px;

  padding: 18px;
  margin-bottom: 18px;

  box-shadow: 0 8px 32px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 36px rgba(0,0,0,0.08);
}

.card-title {
  font-weight: bold;
  margin-bottom: 8px;
}

.card-meta {
  font-size: 12px;
  color: gray;
}

/* ===== 배너 ===== */
.banner {
  background: rgba(37,99,235,0.9);
  color: white;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
}

/* ===== 공지 ===== */
.notice {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 20px;
}

/* ===== 입력 ===== */
.input-box {
  width: 75%;
  padding: 10px 12px;
  border-radius: 12px;

  border: 1px solid rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(6px);

  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

.input-box:focus {
  border-color: #2563eb;
  background: rgba(255,255,255,0.8);
}

/* ===== 버튼 ===== */
.btn-primary {
  padding: 10px 14px;
  border: none;
  border-radius: 12px;
  background-color: #2563eb;
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.btn-primary:hover {
  background-color: #1d4ed8;
}

.btn-danger {
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  background-color: #ef4444;
  color: white;
  font-size: 12px;
  cursor: pointer;
}

.btn-danger:hover {
  background-color: #dc2626;
}

/* ===== 답변 ===== */
.answer-item {
  margin-top: 8px;
  padding: 8px 10px;
  border-radius: 12px;

  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(6px);

  font-size: 13px;
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">
    求援<span class="dot">.</span>
  </div>

  <div class="header-right">
    <div class="points">0P</div>
    <div class="nickname">불러오는 중...</div>
    <div class="logout">로그아웃</div>
  </div>
</header>

<div class="layout">

  <div class="sidebar">
    <div class="menu-item">📄 문답</div>
    <div class="menu-item">🏆 랭킹</div>
    <div class="menu-item">💰 포인트 관리</div>
    <div class="menu-item">👤 마이페이지</div>
  </div>

  <div class="main">

    <div class="banner">
      📢 이번 주 질문 이벤트 진행 중!
    </div>

    <div class="notice">
      <b>공지</b><br>
      - 비속어 사용 금지<br>
      - 학번 공개 금지
    </div>

    <div class="card">
      <input type="text" id="questionInput"
        placeholder="질문을 입력하세요"
        class="input-box" />
      <button id="submitQuestion" class="btn-primary">
        등록
      </button>
    </div>

    <div id="questionList"></div>

  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import { collection, getDocs, doc, getDoc, addDoc, deleteDoc }
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

const nicknameEl = document.querySelector(".nickname");
const pointsEl = document.querySelector(".points");
const logoutBtn = document.querySelector(".logout");
const questionList = document.getElementById("questionList");
const input = document.getElementById("questionInput");
const submitBtn = document.getElementById("submitQuestion");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "/sbh_qna/login.html";
    return;
  }

  const userSnap = await getDoc(doc(db, "users", user.uid));
  if (userSnap.exists()) {
    const data = userSnap.data();
    nicknameEl.innerText = data.nickname;
    pointsEl.innerText = data.points + "P";
  }

  loadQuestions();
});

submitBtn.addEventListener("click", async () => {
  const title = input.value.trim();
  if (!title) return alert("질문을 입력하세요");

  await addDoc(collection(db, "questions"), {
    title,
    nickname: nicknameEl.innerText,
    uid: auth.currentUser.uid,
    answerCount: 0
  });

  input.value = "";
  loadQuestions();
});

async function loadQuestions() {
  const snapshot = await getDocs(collection(db, "questions"));
  questionList.innerHTML = "";

  snapshot.forEach(async (questionDoc) => {
    const data = questionDoc.data();

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-title">${data.title}</div>
      <div class="card-meta">
        작성자: ${data.nickname} | 답변 ${data.answerCount || 0}개
      </div>
    `;

    if (auth.currentUser.uid === data.uid) {
      const deleteBtn = document.createElement("button");
      deleteBtn.innerText = "삭제";
      deleteBtn.className = "btn-danger";
      deleteBtn.style.marginTop = "8px";

      deleteBtn.addEventListener("click", async () => {
        await deleteDoc(doc(db, "questions", questionDoc.id));
        loadQuestions();
      });

      card.appendChild(deleteBtn);
    }

    const answerList = document.createElement("div");
    answerList.style.marginTop = "10px";
    card.appendChild(answerList);

    const answerSnapshot = await getDocs(
      collection(db, "questions", questionDoc.id, "answers")
    );

    answerSnapshot.forEach((answerDoc) => {
      const answerData = answerDoc.data();
      const item = document.createElement("div");
      item.className = "answer-item";
      item.innerText =
        "↳ " + answerData.nickname + " : " + answerData.content;
      answerList.appendChild(item);
    });

    const answerInput = document.createElement("input");
    answerInput.placeholder = "답변을 입력하세요";
    answerInput.className = "input-box";
    answerInput.style.marginTop = "8px";

    const answerBtn = document.createElement("button");
    answerBtn.innerText = "답변";
    answerBtn.className = "btn-primary";
    answerBtn.style.marginLeft = "8px";

    answerBtn.addEventListener("click", async () => {
      const content = answerInput.value.trim();
      if (!content) return alert("답변을 입력하세요");

      await addDoc(
        collection(db, "questions", questionDoc.id, "answers"),
        {
          content,
          nickname: nicknameEl.innerText,
          uid: auth.currentUser.uid
        }
      );

      answerInput.value = "";
      loadQuestions();
    });

    card.appendChild(answerInput);
    card.appendChild(answerBtn);

    questionList.appendChild(card);
  });
}

logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "/sbh_qna/login.html";
});
</script>

</body>
</html>
