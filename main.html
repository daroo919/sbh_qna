<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>구원</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#f9fafb; }
.header { height:70px; padding:0 40px; background:#fff; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #e5e7eb; }
.logo { font-size:24px; font-weight:700; color:#0f172a; }
.dot { color:#2563eb; }
.header-right { display:flex; align-items:center; gap:20px; font-size:14px; }
.points { color:#2563eb; font-weight:600; }
.nickname { color:#374151; }
.logout { cursor:pointer; padding:6px 10px; border-radius:6px; background:#f3f4f6; }
.logout:hover { background:#e5e7eb; }
.layout { display:flex; min-height:calc(100vh - 70px); }
.sidebar { width:220px; background:#fff; border-right:1px solid #e5e7eb; padding-top:20px; }
.menu-item { padding:15px 20px; cursor:pointer; color:#374151; }
.menu-item:hover { background:#f3f4f6; }
.main { flex:1; padding:30px; }
.banner { background:#2563eb; color:white; padding:20px; border-radius:10px; margin-bottom:20px; }
.notice { background:white; padding:15px; border-radius:10px; margin-bottom:20px; border:1px solid #e5e7eb; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:15px; border:1px solid #e5e7eb; }
.card-title { font-weight:bold; margin-bottom:8px; }
.card-meta { font-size:12px; color:gray; }
input, button { font-family:Arial,sans-serif; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">구원<span class="dot">.</span></div>
  <div class="header-right">
    <div class="points">0P</div>
    <div class="nickname">불러오는 중...</div>
    <div class="logout">로그아웃</div>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="menu-item">📄 문답</div>
    <div class="menu-item">🏆 랭킹</div>
    <div class="menu-item">💰 포인트 관리</div>
    <div class="menu-item">👤 마이페이지</div>
  </div>

  <div class="main">
    <div class="banner">📢 이번 주 질문 이벤트 진행 중!</div>
    <div class="notice"><b>공지</b><br>- 비속어 사용 금지<br>- 학번 공개 금지</div>

    <!-- 질문 작성 -->
    <div class="card">
      <input type="text" id="questionInput" placeholder="질문을 입력하세요" style="width:75%; padding:8px;">
      <button id="submitQuestion" style="padding:8px 12px; margin-left:10px;">등록</button>
    </div>

    <!-- 질문 리스트 -->
    <div id="questionList"></div>
  </div>
</div>

<script type="module">
import { auth, db } from "/sbh_qna/firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
import { collection, getDocs, doc, getDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

const nicknameEl = document.querySelector(".nickname");
const pointsEl = document.querySelector(".points");
const logoutBtn = document.querySelector(".logout");
const questionList = document.getElementById("questionList");

const input = document.getElementById("questionInput");
const submitBtn = document.getElementById("submitQuestion");

// 로그인 상태 확인
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "/sbh_qna/login.html"; return; }
  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);
  if(userSnap.exists()) {
    const data = userSnap.data();
    nicknameEl.innerText = data.nickname;
    pointsEl.innerText = data.points + "P";
  }
  loadQuestions();
});

// 질문 작성
submitBtn.addEventListener("click", async () => {
  const title = input.value.trim();
  if(!title){ alert("질문을 입력하세요"); return; }
  const user = auth.currentUser;
  if(!user) return;

  await addDoc(collection(db,"questions"), {
    title: title,
    nickname: nicknameEl.innerText,
    answerCount: 0,
    uid: user.uid
  });

  input.value="";
  loadQuestions();
});

// 질문 목록 + 삭제
async function loadQuestions() {
  const querySnapshot = await getDocs(collection(db,"questions"));
  questionList.innerHTML="";
  querySnapshot.forEach((questionDoc)=>{
    const data = questionDoc.data();
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML = `
      <div class="card-title">${data.title}</div>
      <div class="card-meta">작성자: ${data.nickname} | 답변 ${data.answerCount||0}개</div>
    `;

    // 삭제 버튼
    if(auth.currentUser && auth.currentUser.uid===data.uid){
      const deleteBtn = document.createElement("button");
      deleteBtn.innerText="삭제";
      deleteBtn.style.marginTop="8px";
      deleteBtn.style.padding="4px 8px";
      deleteBtn.addEventListener("click",async()=>{
        await deleteDoc(doc(db,"questions",questionDoc.id));
        loadQuestions();
      });
      card.appendChild(deleteBtn);
    }

    questionList.appendChild(card);
  });
}

// 로그아웃
logoutBtn.addEventListener("click",async()=>{
  await signOut(auth);
  window.location.href="/sbh_qna/login.html";
});
</script>

</body>
</html>
