<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 마이페이지</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); min-height: 100vh; }
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; }
    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); padding-top: 20px; }
    .menu-item { padding: 15px 20px; cursor: pointer; color: #374151; }
    .main { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; }
    .profile-card { width: 100%; max-width: 500px; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .field { margin-bottom: 20px; }
    .label { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .input-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    .save-btn { width: 100%; padding: 12px; background: #0f172a; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div style="font-size:14px; color:#2563eb; font-weight:600" id="hPoints">0P</div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
      <div class="menu-item" onclick="location.href='mypage.html'">⚙️ 마이페이지</div>
    </div>
    <div class="main">
      <div class="profile-card">
        <h2 style="margin-top:0">내 프로필 설정</h2>
        <div class="field">
          <div class="label">이메일 계정</div>
          <div id="emailDisp" style="color:#94a3b8">불러오는 중...</div>
        </div>
        <div class="field">
          <div class="label">신분</div>
          <div id="roleDisp" style="font-weight:bold">로딩 중...</div>
        </div>
        <div class="field">
          <div class="label">닉네임 변경</div>
          <input type="text" id="nickInput" class="input-box">
        </div>
        <button id="saveBtn" class="save-btn">저장하기</button>
      </div>
    </div>
  </div>
  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    onAuthStateChanged(auth, async user => {
      if(!user) return location.href="login.html";
      const s = await getDoc(doc(db, "users", user.uid));
      if(s.exists()){
        const d = s.data();
        document.getElementById("emailDisp").innerText = user.email;
        document.getElementById("roleDisp").innerText = d.role === "admin" ? "관리자" : (d.role === "teacher" ? "선생님" : "학생");
        document.getElementById("nickInput").value = d.nickname;
        document.getElementById("hPoints").innerText = (d.points||0)+"P";
      }
    });

    document.getElementById("saveBtn").onclick = async () => {
      const newNick = document.getElementById("nickInput").value.trim();
      if(!newNick) return alert("닉네임 입력!");
      await updateDoc(doc(db, "users", auth.currentUser.uid), { nickname: newNick });
      alert("변경되었습니다!");
      location.href = "main.html";
    };
  </script>
</body>
</html>
