<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>求援 - 마이페이지</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points" id="hPoints">0P</div>
      <div class="nickname" id="hNick" onclick="location.href='mypage.html'">로딩 중...</div>
      <button class="logout" id="logoutBtn">로그아웃</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
      <div class="menu-item active" onclick="location.href='mypage.html'">⚙️ 마이페이지</div>
    </aside>

    <main class="main">
      <div class="profile-card">
        <h2 style="margin-top:0; color:#0f172a;">내 프로필 설정</h2>

        <div class="field">
          <div class="label">계정 이메일</div>
          <div id="emailDisp" style="font-weight: 500; color:#334155;">-</div>
        </div>

        <div class="field">
          <div class="label">닉네임 변경</div>
          <input type="text" id="nickInput" class="input-box" placeholder="닉네임 입력">
        </div>

        <div class="field">
          <div class="label">나만의 배경 이미지</div>
          <div style="display: flex; gap: 10px;">
            <div class="upload-box" onclick="document.getElementById('fileInput').click()" style="flex: 1;">
              <span id="fileName">🖼️ 배경 사진 선택</span>
              <input type="file" id="fileInput" accept="image/*" style="display:none">
            </div>
            <button id="delBgBtn"
              style="padding: 0 15px; border-radius: 16px; border: 1px solid #ef4444; background: rgba(239, 68, 68, 0.05); color: #ef4444; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 13px;">삭제</button>
          </div>
          <p style="font-size: 11px; color: #94a3b8; margin-top: 8px;">* 사진을 저장하면 모든 페이지의 배경이 바뀝니다.</p>
        </div>

        <button id="saveBtn" class="save-btn">저장하기</button>
      </div>
    </main>
  </div>

  <nav class="bottom-tab">
    <a href="qna.html" class="tab-item"><span class="tab-icon">📄</span><span>문답</span></a>
    <a href="talk.html" class="tab-item"><span class="tab-icon">👤</span><span>잡담</span></a>
    <a href="point.html" class="tab-item"><span class="tab-icon">💰</span><span>포인트</span></a>
    <a href="mypage.html" class="tab-item active"><span class="tab-icon">⚙️</span><span>마이</span></a>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-storage.js";

    const fileInput = document.getElementById('fileInput');
    let selectedFile = null;

    // 파일 선택 시 이름 미리보기
    fileInput.onchange = e => {
      selectedFile = e.target.files[0];
      if (selectedFile) document.getElementById('fileName').innerText = "✅ 선택됨: " + selectedFile.name;
    };

    onAuthStateChanged(auth, async u => {
      if (!u) return location.href = "login.html";

      const s = await getDoc(doc(db, "users", u.uid));
      if (s.exists()) {
        const d = s.data();

        // 로컬 스토리지에서 이미지 가져오기
        const localBg = localStorage.getItem(`bg_${u.uid}`);
        if (localBg) {
          document.body.style.backgroundImage = `linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), url('${localBg}')`;
        }
        document.getElementById("hNick").innerText = d.nickname;
        document.getElementById("hPoints").innerText = (d.points || 0) + "P";
        document.getElementById("emailDisp").innerText = u.email;
        document.getElementById("nickInput").value = d.nickname;
      }
    });

    document.getElementById("delBgBtn").onclick = () => {
      const user = auth.currentUser;
      if (!user) return;

      if (confirm("배경 이미지를 삭제하고 기본 배경으로 돌아갈까요?")) {
        // 로컬 스토리지에서 해당 유저의 배경 데이터 삭제
        localStorage.removeItem(`bg_${user.uid}`);
        alert("기본 배경으로 복구되었습니다! ✨");
        location.reload(); // 즉시 반영을 위해 새로고침
      }
    };

    // 저장 버튼 로직 (기존 유지)
    document.getElementById("saveBtn").onclick = async () => {
      const user = auth.currentUser;
      const newNick = document.getElementById("nickInput").value.trim();

      try {
        // 1. 닉네임 업데이트
        await updateDoc(doc(db, "users", user.uid), { nickname: newNick });

        // 2. 이미지 파일 처리
        if (selectedFile) {
          const reader = new FileReader();
          reader.onload = function (e) {
            localStorage.setItem(`bg_${user.uid}`, e.target.result);
            alert("프로필과 배경이 저장되었습니다! ✨");
            location.reload();
          };
          reader.readAsDataURL(selectedFile);
        } else {
          alert("닉네임이 성공적으로 변경되었습니다!");
          location.reload();
        }
      } catch (e) {
        alert("저장 중 오류가 발생했습니다.");
      }
    };

    document.getElementById("logoutBtn").onclick = () => {
      if (confirm("로그아웃 하시겠습니까?")) signOut(auth).then(() => location.href = "login.html");
    };
  </script>
</body>

</html>
