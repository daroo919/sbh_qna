<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 마이페이지</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); background-size: 400% 400%; animation: gradientMove 20s ease infinite; min-height: 100vh; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.4); position: sticky; top:0; z-index:100; }
    .logo { font-size: 24px; font-weight: 700; color: #0f172a; cursor: pointer; user-select: none; }
    .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; }
    
    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; padding-top: 20px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); }
    .menu-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; }
    .menu-item:hover { background: rgba(255, 255, 255, 0.6); color: #2563eb; }

    .main { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; }
    .profile-card { width: 100%; max-width: 500px; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
    
    .role-tag { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: bold; margin-bottom: 10px; color: white; }
    .role-student { background: #64748b; }
    .role-teacher { background: #f59e0b; }
    .role-admin { background: #ef4444; }

    .user-name { font-size: 24px; font-weight: bold; margin-bottom: 5px; color: #1e293b; }
    .user-email { font-size: 14px; color: #64748b; margin-bottom: 20px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; text-align: left; }
    .info-item { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #f1f5f9; }
    .info-label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
    .info-value { font-size: 16px; font-weight: bold; color: #334155; }

    .edit-section { margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px; width: 100%; }
    .input-box { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
    .save-btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .save-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span style="color:#2563eb">.</span></div>
    <div class="header-right">
      <div class="points" id="headerPoints">0P</div>
      <div class="nickname" id="headerNickname">불러오는 중...</div>
      <div class="logout" style="cursor:pointer" onclick="handleLogout()">로그아웃</div>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar" id="sidebarMenu">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
      <div class="menu-item" onclick="location.href='mypage.html'" style="color:#2563eb; font-weight:bold;">⚙️ 마이페이지</div>
    </div>

    <div class="main">
      <div class="profile-card">
        <div id="roleTag" class="role-tag">로딩 중...</div>
        <div class="user-name" id="userName">닉네임</div>
        <div class="user-email" id="userEmail">email@school.ac.kr</div>

        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">보유 포인트</div>
            <div class="info-value" id="userPoints">0 P</div>
          </div>
          <div class="info-item">
            <div class="info-label">장착 뱃지</div>
            <div class="info-value" id="userBadge">없음</div>
          </div>
        </div>

        <div class="edit-section">
          <div style="text-align:left; font-size: 14px; font-weight:bold; margin-bottom:10px;">닉네임 변경</div>
          <input type="text" id="newNickname" class="input-box" placeholder="새 닉네임 입력">
          <button class="save-btn" onclick="updateNickname()">정보 수정하기</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";
      
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        const data = snap.data();
        const role = data.role || "student";
        
        // 데이터 채우기
        document.getElementById("userName").innerText = data.nickname;
        document.getElementById("userEmail").innerText = user.email;
        document.getElementById("userPoints").innerText = (data.points || 0) + " P";
        document.getElementById("userBadge").innerText = data.currentBadge || "없음";
        document.getElementById("headerNickname").innerText = (data.currentBadge || "") + " " + data.nickname;
        document.getElementById("headerPoints").innerText = (data.points || 0) + "P";

        // 역할 배지 설정
        const roleTag = document.getElementById("roleTag");
        roleTag.className = `role-tag role-${role}`;
        roleTag.innerText = role === "admin" ? "관리자" : (role === "teacher" ? "선생님" : "학생");
      }
    });

    window.updateNickname = async () => {
      const newName = document.getElementById("newNickname").value.trim();
      if (!newName) return alert("변경할 닉네임을 입력하세요.");
      
      try {
        await updateDoc(doc(db, "users", auth.currentUser.uid), { nickname: newName });
        alert("닉네임이 성공적으로 변경되었습니다!");
        location.reload();
      } catch (e) {
        alert("오류가 발생했습니다.");
      }
    };

    window.handleLogout = () => { if(confirm("로그아웃 하시겠습니까?")) signOut(auth); };
  </script>
</body>
</html>
