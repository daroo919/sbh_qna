<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 문답</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); background-size: 400% 400%; animation: gradientMove 20s ease infinite; min-height: 100vh; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.4); }
    .logo { font-size: 24px; font-weight: 700; color: #0f172a; cursor: pointer; user-select: none; }
    .dot { color: #2563eb; }
    .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; }
    .points { color: #2563eb; font-weight: 600; }
    .logout { cursor: pointer; padding: 6px 10px; border-radius: 8px; background: rgba(255, 255, 255, 0.6); }
    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; padding-top: 20px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); }
    .menu-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; }
    .menu-item:hover { background: rgba(255, 255, 255, 0.6); color: #2563eb; }
    .main { flex: 1; padding: 30px; }
    .card { position: relative; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 16px; padding: 20px; margin-bottom: 18px; }
    .card-title { font-weight: bold; margin-bottom: 8px; }
    .card-meta { font-size: 12px; color: gray; }
    .question-delete { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: none; border-radius: 8px; font-size: 11px; padding: 4px 8px; cursor: pointer; }
    .accept-btn { background: #22c55e; color: white; border: none; border-radius: 8px; font-size: 11px; padding: 4px 8px; cursor: pointer; margin-left: 10px; }
    .answer-item { position: relative; margin-top: 8px; padding: 8px 12px; border-radius: 12px; background: rgba(255, 255, 255, 0.4); font-size: 13px; }
    .accepted-answer { background: #d1fae5 !important; border: 1px solid #10b981; }
    .answer-delete { background: #ef4444; color: white; border: none; border-radius: 6px; padding: 2px 6px; font-size: 11px; cursor: pointer; float: right; }
    .input-box { border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.5); background: rgba(255, 255, 255, 0.5); padding: 10px 12px; outline: none; }
    .input-box:disabled { background: rgba(200, 200, 200, 0.2); cursor: not-allowed; }
    .btn-primary { padding: 10px 14px; border: none; border-radius: 12px; background-color: #2563eb; color: white; cursor: pointer; }
    .answer-input-row { display: flex; gap: 8px; margin-top: 15px; }
    .answer-input-row .input-box { flex: 1; }
    .question-input-row { display: flex; gap: 8px; margin-bottom: 18px; }
    .question-input-row #questionInput { flex: 1; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points">0P</div>
      <div class="nickname">불러오는 중...</div>
      <div class="logout">로그아웃</div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item">👤 잡담</div>
      <div class="menu-item">💰 포인트 관리</div>
    </div>
    <div class="main">
      <div class="card question-input-row">
        <input type="text" id="questionInput" placeholder="질문을 입력하세요" class="input-box">
        <button id="submitQuestion" class="btn-primary">등록</button>
      </div>
      <div id="questionList"></div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { collection, getDocs, doc, getDoc, addDoc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const nicknameEl = document.querySelector(".nickname"), 
          pointsEl = document.querySelector(".points"), 
          questionList = document.getElementById("questionList"), 
          input = document.getElementById("questionInput");

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "/sbh_qna/login.html";
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) { 
        nicknameEl.innerText = snap.data().nickname; 
        pointsEl.innerText = (snap.data().points || 0) + "P"; 
      }
      loadQuestions();
    });

    document.getElementById("submitQuestion").onclick = async () => {
      const title = input.value.trim();
      if (!title) return alert("질문을 입력하세요");
      try {
        await addDoc(collection(db, "questions"), { 
          title, 
          nickname: nicknameEl.innerText, 
          uid: auth.currentUser.uid, 
          answerCount: 0, 
          acceptedAnswerId: null 
        });
        input.value = ""; 
        loadQuestions();
      } catch(e) { console.error(e); alert("등록 실패!"); }
    };

    async function loadQuestions() {
      const snapshot = await getDocs(collection(db, "questions"));
      questionList.innerHTML = "";
      
      for (const qDoc of snapshot.docs) {
        const qData = qDoc.data();
        const qId = qDoc.id; // 질문 ID 저장
        const isMyQuestion = auth.currentUser.uid === qData.uid;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          ${isMyQuestion ? `<button class="question-delete">삭제</button>` : ''}
          <div class="card-title">${qData.title}</div>
          <div class="card-meta">작성자: ${qData.nickname} | 답변 ${qData.answerCount || 0}개</div>
          <div class="answers-container"></div>
          <div class="answer-input-row">
            <input type="text" 
                   placeholder="${isMyQuestion ? '자신의 질문에는 답변할 수 없습니다' : '답변을 입력하세요'}" 
                   class="input-box answer-input" 
                   ${isMyQuestion ? 'disabled' : ''}>
            <button class="btn-primary add-answer-btn" ${isMyQuestion ? 'style="display:none;"' : ''}>답변</button>
          </div>
        `;

        if (isMyQuestion) {
          card.querySelector(".question-delete").onclick = async () => { 
            if(confirm("삭제하시겠습니까?")) { await deleteDoc(doc(db, "questions", qId)); loadQuestions(); } 
          };
        } else {
          card.querySelector(".add-answer-btn").onclick = async () => {
            const aInput = card.querySelector(".answer-input");
            if (!aInput.value.trim()) return alert("내용을 입력하세요");
            await addDoc(collection(db, "questions", qId, "answers"), { 
              content: aInput.value, 
              nickname: nicknameEl.innerText, 
              uid: auth.currentUser.uid 
            });
            await updateDoc(doc(db, "questions", qId), { answerCount: increment(1) });
            loadQuestions();
          };
        }

        const container = card.querySelector(".answers-container");
        await loadAnswers(qId, qData, container);
        questionList.appendChild(card);
      }
    }

    async function loadAnswers(qId, qData, container) {
      const snap = await getDocs(collection(db, "questions", qId, "answers"));
      snap.forEach(aDoc => {
        const aData = aDoc.data(), 
              isAccepted = qData.acceptedAnswerId === aDoc.id;
        const item = document.createElement("div");
        item.className = `answer-item ${isAccepted ? 'accepted-answer' : ''}`;
        
        item.innerHTML = `
          ↳ ${aData.nickname} : ${aData.content} 
          ${auth.currentUser.uid === qData.uid && !qData.acceptedAnswerId ? `<button class="accept-btn">채택</button>` : ''} 
          ${auth.currentUser.uid === aData.uid ? `<button class="answer-delete">삭제</button>` : ''}
        `;
        
        if (item.querySelector(".accept-btn")) {
          item.querySelector(".accept-btn").onclick = async () => { 
            await updateDoc(doc(db, "questions", qId), { acceptedAnswerId: aDoc.id }); 
            loadQuestions(); 
          };
        }
        if (item.querySelector(".answer-delete")) {
          item.querySelector(".answer-delete").onclick = async () => { 
            await deleteDoc(doc(db, "questions", qId, "answers", aDoc.id)); 
            await updateDoc(doc(db, "questions", qId), { answerCount: increment(-1) }); 
            loadQuestions(); 
          };
        }
        container.appendChild(item);
      });
    }

    document.querySelector(".logout").onclick = async () => { 
      await signOut(auth); 
      window.location.href = "/sbh_qna/login.html"; 
    };
  </script>
</body>
</html>
