<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>求援 - 문답</title>
  <style>
    /* 기본 레이아웃 및 애니메이션 */
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, sans-serif;
      /* 기본 그라데이션 */
      background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe);
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      min-height: 100vh;
      padding-bottom: 80px;
      transition: background-image 0.5s ease-in-out;
    }

    /* 헤더 스타일 */
    .header {
      height: 70px;
      padding: 0 20px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
      cursor: pointer;
    }

    .dot {
      color: #2563eb;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .points {
      color: #2563eb;
      font-weight: 700;
      background: rgba(37, 99, 235, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* 로그아웃 버튼 (빨간색 테마 유지) */
    .logout {
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      font-weight: bold;
      font-size: 12px;
      transition: 0.3s;
    }

    .logout:hover {
      background: #ef4444;
      color: white;
    }

    .layout {
      display: flex;
    }

    /* 사이드바 (데스크톱 전용) */
    .sidebar {
      width: 220px;
      padding-top: 20px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255, 255, 255, 0.4);
      min-height: calc(100vh - 70px);
    }

    .menu-item {
      padding: 15px 20px;
      cursor: pointer;
      transition: 0.3s;
      color: #374151;
      font-weight: 500;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.6);
      color: #2563eb;
    }

    /* 하단 탭 바 (모바일 전용) */
    .bottom-tab {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 11px;
      color: #64748b;
      cursor: pointer;
      flex: 1;
      gap: 4px;
    }

    .tab-item.active {
      color: #2563eb;
      font-weight: bold;
    }

    .tab-icon {
      font-size: 20px;
    }

    /* 메인 콘텐츠 영역 */
    .main {
      flex: 1;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid white;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
    }

    .card.completed {
      background: rgba(209, 250, 229, 0.7);
      border-color: #10b981;
    }

    .card-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 10px;
      color: #1e293b;
      line-height: 1.4;
    }

    .card-meta {
      font-size: 12px;
      color: #64748b;
    }

    .input-box {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      background: white;
      padding: 12px;
      outline: none;
      font-size: 14px;
      box-sizing: border-box;
    }

    .btn-primary {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      white-space: nowrap;
    }

    .btn-primary:active {
      transform: scale(0.96);
    }

    .answer-item {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      line-height: 1.5;
    }

    .accepted-answer {
      background: #ffffff !important;
      border: 2px solid #10b981;
    }

    /* 모바일 반응형 미디어 쿼리 */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      /* 사이드바 숨김 */
      .bottom-tab {
        display: flex;
      }

      /* 하단 탭 바 표시 */
      .header {
        padding: 0 15px;
      }

      .main {
        padding: 15px;
      }

      body {
        padding-bottom: 80px;
      }

      .card-title {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points">0P</div>
      <div class="nickname" onclick="location.href='mypage.html'">로딩...</div>
      <div class="logout">로그아웃</div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
      <div class="menu-item" onclick="location.href='mypage.html'">⚙️ 마이페이지</div>
    </aside>

    <main class="main">
      <div class="card question-input-row" style="display: flex; gap: 8px;">
        <input type="text" id="questionInput" placeholder="궁금한 것을 물어보세요!" class="input-box">
        <button id="submitQuestion" class="btn-primary">등록</button>
      </div>
      <div id="questionList"></div>
    </main>
  </div>

  <nav class="bottom-tab">
    <div class="tab-item active" onclick="location.href='qna.html'">
      <span class="tab-icon">📄</span>
      <span>문답</span>
    </div>
    <div class="tab-item" onclick="location.href='talk.html'">
      <span class="tab-icon">👤</span>
      <span>잡담</span>
    </div>
    <div class="tab-item" onclick="location.href='point.html'">
      <span class="tab-icon">💰</span>
      <span>포인트</span>
    </div>
    <div class="tab-item" onclick="location.href='mypage.html'">
      <span class="tab-icon">⚙️</span>
      <span>마이</span>
    </div>
  </nav>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { collection, getDocs, doc, getDoc, addDoc, deleteDoc, updateDoc, increment, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const nicknameEl = document.querySelector(".nickname"),
      pointsEl = document.querySelector(".points"),
      questionList = document.getElementById("questionList"),
      input = document.getElementById("questionInput");

    let myNickname = "", userRole = "student";

    // 엔터키 질문 등록 기능 추가
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById("submitQuestion").click(); });

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        const data = snap.data();
        userRole = data.role || "student";
        const badge = data.currentBadge || "";
        myNickname = data.nickname;
        let roleName = userRole === "admin" ? "관리자" : (userRole === "teacher" ? "선생님" : "학생");
        nicknameEl.innerHTML = `<span class="role-text role-${userRole}">[${roleName}]</span> ${badge} ${myNickname}`;
        pointsEl.innerText = (data.points || 0) + "P";
      }
      loadQuestions();

      // 로컬 스토리지에서 이미지 가져오기
      const localBg = localStorage.getItem(`bg_${user.uid}`);
      if (localBg) {
        document.body.style.backgroundImage = `linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), url('${localBg}')`;
      }
    });

    document.getElementById("submitQuestion").onclick = async () => {
      const title = input.value.trim();
      if (!title) return;
      await addDoc(collection(db, "questions"), { title, nickname: myNickname, uid: auth.currentUser.uid, answerCount: 0, acceptedAnswerId: null, createdAt: Date.now() });
      input.value = "";
    };

    function loadQuestions() {
      const q = query(collection(db, "questions"), orderBy("createdAt", "desc"));
      onSnapshot(q, async (snapshot) => {
        questionList.innerHTML = "";
        for (const qDoc of snapshot.docs) {
          const qData = qDoc.data(), qId = qDoc.id, isMyQ = auth.currentUser.uid === qData.uid, isDone = qData.acceptedAnswerId !== null;
          const card = document.createElement("div");
          card.className = `card ${isDone ? 'completed' : ''}`;
          card.innerHTML = `
            ${(isMyQ || userRole === "admin") ? `<button class="question-delete" style="position:absolute; top:15px; right:15px; background:none; border:none; color:#ef4444; cursor:pointer; font-weight:bold;">삭제</button>` : ''}
            ${isDone ? `<span style="background:#10b981; color:white; font-size:10px; padding:3px 8px; border-radius:10px; font-weight:bold;">해결됨</span>` : ''}
            <div class="card-title" style="margin-top:8px">${qData.title}</div>
            <div class="card-meta">작성자: ${qData.nickname} | 답변 ${qData.answerCount || 0}개</div>
            <div class="answers-container"></div>
            <div style="display:flex; gap:8px; margin-top:15px;">
              <input type="text" placeholder="${isDone ? '이미 해결된 질문입니다' : '답변을 남겨주세요'}" class="input-box answer-input" ${isDone ? 'disabled' : ''}>
              <button class="btn-primary add-answer-btn" ${isDone ? 'style="display:none"' : ''}>답변</button>
            </div>
          `;

          if (card.querySelector(".question-delete")) {
            card.querySelector(".question-delete").onclick = async () => { if (confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "questions", qId)); };
          }

          const container = card.querySelector(".answers-container");
          loadAnswers(qId, qData, container);

          card.querySelector(".add-answer-btn").onclick = async () => {
            const aInput = card.querySelector(".answer-input");
            if (!aInput.value.trim()) return;
            await addDoc(collection(db, "questions", qId, "answers"), { content: aInput.value, nickname: myNickname, uid: auth.currentUser.uid, createdAt: Date.now() });
            await updateDoc(doc(db, "questions", qId), { answerCount: increment(1) });
            aInput.value = "";
          };
          questionList.appendChild(card);
        }
      });
    }

    async function loadAnswers(qId, qData, container) {
      const snap = await getDocs(query(collection(db, "questions", qId, "answers"), orderBy("createdAt", "asc")));
      container.innerHTML = "";
      snap.docs.forEach(aDoc => {
        const aData = aDoc.data(), aId = aDoc.id, isAcc = qData.acceptedAnswerId === aId;
        const item = document.createElement("div");
        item.className = `answer-item ${isAcc ? 'accepted-answer' : ''}`;
        item.innerHTML = `
          <div style="font-weight:bold; font-size:12px; color:#2563eb; margin-bottom:4px;">↳ ${aData.nickname}</div>
          <div>${aData.content}</div>
          ${auth.currentUser.uid === qData.uid && !qData.acceptedAnswerId ? `<button class="accept-btn" style="margin-top:8px; background:#10b981; color:white; border:none; padding:5px 10px; border-radius:8px; font-size:11px; cursor:pointer;">이 답변 채택하기</button>` : ''}
        `;

        if (item.querySelector(".accept-btn")) {
          item.querySelector(".accept-btn").onclick = async () => {
            if (confirm("채택하시겠습니까? 답변자에게 10P가 지급됩니다.")) {
              await updateDoc(doc(db, "questions", qId), { acceptedAnswerId: aId });
              await updateDoc(doc(db, "users", aData.uid), { points: increment(10) });
            }
          };
        }
        container.appendChild(item);
      });
    }

    document.querySelector(".logout").onclick = async () => { if (confirm("로그아웃 하시겠습니까?")) { await signOut(auth); window.location.href = "login.html"; } };
  </script>
</body>

</html>
