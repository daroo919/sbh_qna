<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 잡담</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); min-height: 100vh; }
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.4); position: sticky; top:0; z-index:100; }
    .logo { font-size: 24px; font-weight: 700; color: #0f172a; cursor: pointer; }
    .dot { color: #2563eb; }
    .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; }
    .points { color: #2563eb; font-weight: 600; }
    .logout { cursor: pointer; padding: 6px 12px; border-radius: 8px; background: rgba(255, 255, 255, 0.6); font-weight: bold; transition: 0.2s; }
    .logout:hover { background: #fee2e2; color: #ef4444; }
    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; padding-top: 20px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); }
    .menu-item { padding: 15px 20px; cursor: pointer; color: #374151; transition: 0.3s; }
    .main { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; }
    .input-row { width: 100%; max-width: 600px; display: flex; gap: 10px; margin-bottom: 25px; align-items: stretch; }
    .input-box { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.5); background: white; outline: none; transition: 0.3s; }
    .btn-send { width: 80px; background: #2563eb; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-send:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(37, 99, 235, 0.3); }
    .talk-card { width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(10px); border-radius: 16px; padding: 20px; margin-bottom: 15px; position: relative; border: 1px solid white; transition: 0.3s; }
    .talk-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .talk-user { font-size: 13px; font-weight: bold; color: #2563eb; margin-bottom: 8px; }
    .talk-delete { position: absolute; top: 15px; right: 15px; color: #ef4444; cursor: pointer; font-size: 12px; font-weight: bold; }
    .comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
    .comment-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
    .btn-comment { padding: 5px 15px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
    .btn-comment:hover { background: #1d4ed8; }
    .comment-item { background: rgba(255,255,255,0.4); padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; display: flex; justify-content: space-between; }
    .role-text { font-size: 11px; font-weight: bold; margin-right: 5px; }
    .role-admin { color: #ef4444; } .role-teacher { color: #f59e0b; } .role-student { color: #64748b; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points" id="hPoints">0P</div>
      <div class="nickname" id="hNick" style="cursor:pointer" onclick="location.href='mypage.html'">로딩...</div>
      <div class="logout" id="logoutBtn">로그아웃</div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
      <div class="menu-item" onclick="location.href='mypage.html'">⚙️ 마이페이지</div>
    </div>
    <div class="main">
      <div class="input-row">
        <input type="text" id="talkInput" class="input-box" placeholder="무슨 생각을 하고 계신가요?">
        <button id="talkBtn" class="btn-send">게시</button>
      </div>
      <div id="talkList" style="width: 100%; max-width: 600px;"></div>
    </div>
  </div>
  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { collection, addDoc, query, orderBy, onSnapshot, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    let my = null;
    onAuthStateChanged(auth, async u => {
      if(!u) return location.href="login.html";
      const s = await getDoc(doc(db, "users", u.uid));
      my = s.data(); my.uid = u.uid;
      const rName = my.role === "admin" ? "관리자" : (my.role === "teacher" ? "선생님" : "학생");
      document.getElementById("hNick").innerHTML = `<span class="role-text role-${my.role}">[${rName}]</span> ${my.currentBadge||''} ${my.nickname}`;
      document.getElementById("hPoints").innerText = (my.points||0)+"P";
      loadTalks();
    });

    document.getElementById("talkBtn").onclick = async () => {
      const v = document.getElementById("talkInput").value.trim();
      if(!v) return;
      await addDoc(collection(db, "talks"), { content: v, nickname: my.nickname, uid: my.uid, badge: my.currentBadge||'', createdAt: Date.now() });
      document.getElementById("talkInput").value = "";
    };

    function loadTalks() {
      onSnapshot(query(collection(db, "talks"), orderBy("createdAt", "desc")), snap => {
        const list = document.getElementById("talkList"); list.innerHTML = "";
        snap.forEach(d => {
          const data = d.data();
          const canDel = (my.uid === data.uid || my.role === "admin" || my.role === "teacher");
          const card = document.createElement("div");
          card.className = "talk-card";
          card.innerHTML = `<div class="talk-user">${data.badge} ${data.nickname}</div>${canDel ? `<div class="talk-delete" onclick="window.delTalk('${d.id}')">삭제</div>` : ""}<div>${data.content}</div><div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;"><div id="comments-${d.id}"></div><div class="comment-input-row"><input type="text" class="comment-input" id="cInput-${d.id}" placeholder="댓글..."><button class="btn-comment" onclick="window.addComment('${d.id}')">등록</button></div></div>`;
          list.appendChild(card);
          loadComments(d.id);
        });
      });
    }

    function loadComments(tid) {
      onSnapshot(query(collection(db, "talks", tid, "comments"), orderBy("createdAt", "asc")), snap => {
        const box = document.getElementById(`comments-${tid}`); if(!box) return; box.innerHTML = "";
        snap.forEach(cd => {
          const c = cd.data();
          const canDelC = (my.uid === c.uid || my.role === "admin" || my.role === "teacher");
          box.innerHTML += `<div class="comment-item"><span><b>${c.badge}${c.nickname}</b> ${c.content}</span>${canDelC ? `<span onclick="window.delComm('${tid}','${cd.id}')" style="cursor:pointer; color:#ccc;">✕</span>` : ""}</div>`;
        });
      });
    }

    window.addComment = async (tid) => {
      const i = document.getElementById(`cInput-${tid}`); if(!i.value.trim()) return;
      await addDoc(collection(db, "talks", tid, "comments"), { content: i.value, nickname: my.nickname, uid: my.uid, badge: my.currentBadge||'', createdAt: Date.now() });
      i.value = "";
    };
    window.delTalk = async id => { if(confirm("삭제?")) await deleteDoc(doc(db, "talks", id)); };
    window.delComm = async (tid, cid) => { if(confirm("댓글 삭제?")) await deleteDoc(doc(db, "talks", tid, "comments", cid)); };
    document.getElementById("logoutBtn").onclick = () => { if(confirm("로그아웃?")) signOut(auth).then(()=>location.href="login.html"); };
  </script>
</body>
</html>
