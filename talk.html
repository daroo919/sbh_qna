<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 잡담</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); background-size: 400% 400%; animation: gradientMove 20s ease infinite; min-height: 100vh; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.4); position: sticky; top:0; z-index:100; }
    .logo { font-size: 24px; font-weight: 700; color: #0f172a; cursor: pointer; user-select: none; }
    .dot { color: #2563eb; }
    .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; }
    .points { color: #2563eb; font-weight: 600; }
    .logout { cursor: pointer; padding: 6px 10px; border-radius: 8px; background: rgba(255, 255, 255, 0.6); }
    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; padding-top: 20px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); }
    .menu-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; }
    .menu-item:hover { background: rgba(255, 255, 255, 0.6); color: #2563eb; }
    .main { flex: 1; padding: 30px; }
    .card { position: relative; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 16px; padding: 20px; margin-bottom: 18px; transition: 0.3s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .input-box { border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.5); background: rgba(255, 255, 255, 0.5); padding: 10px 12px; outline: none; }
    .btn-primary { padding: 10px 14px; border: none; border-radius: 12px; background-color: #2563eb; color: white; cursor: pointer; }

    /* 뱃지 스타일 */
    .user-nickname { display: inline-block; font-weight: bold; }
    .nick-지존::before, .nick-지존::after { content: "⭐"; font-size: 10px; margin: 0 4px; animation: twinkle 1s infinite alternate; }
    @keyframes twinkle { from { opacity: 0.4; } to { opacity: 1; } }
    .nick-星 { background: linear-gradient(to right, #000000, #64748b, #000000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 1px rgba(255,255,255,0.5); }
    .nick-火 { color: #ef4444; text-shadow: 0 0 5px rgba(239, 68, 68, 0.4); }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points">0P</div>
      <div class="nickname">불러오는 중...</div>
      <div class="logout">로그아웃</div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
    </div>
    <div class="main">
      <div class="card" style="display:flex; gap:8px;">
        <input type="text" id="talkInput" placeholder="무슨 생각을 하고 계신가요?" class="input-box" style="flex:1">
        <button id="submitTalk" class="btn-primary">등록</button>
      </div>
      <div id="talkList"></div>
    </div>
  </div>
  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { collection, doc, getDoc, addDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const nicknameEl = document.querySelector(".nickname"), pointsEl = document.querySelector(".points"), talkList = document.getElementById("talkList"), input = document.getElementById("talkInput");
    let myBadge = "";

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        myBadge = snap.data().currentBadge || "";
        nicknameEl.innerText = (myBadge + " " + snap.data().nickname).trim();
        pointsEl.innerText = (snap.data().points || 0) + "P";
      }
      loadTalks();
    });

    document.getElementById("submitTalk").onclick = async () => {
      if (!input.value.trim()) return;
      await addDoc(collection(db, "talks"), {
        content: input.value,
        nickname: nicknameEl.innerText.replace(myBadge, "").trim(),
        uid: auth.currentUser.uid,
        createdAt: Date.now()
      });
      input.value = "";
    };

    function loadTalks() {
      const q = query(collection(db, "talks"), orderBy("createdAt", "desc"));
      onSnapshot(q, async (snapshot) => {
        talkList.innerHTML = "";
        for (const tDoc of snapshot.docs) {
          const tData = tDoc.data();
          const uSnap = await getDoc(doc(db, "users", tData.uid));
          const badge = (uSnap.exists() && uSnap.data().currentBadge) ? uSnap.data().currentBadge : "";
          const tClass = badge ? `nick-${badge}` : "";

          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div style="font-size:12px; color:gray; margin-bottom:8px;">
              <span style="color:#2563eb; font-weight:bold;">${badge}</span>
              <span class="user-nickname ${tClass}">${tData.nickname}</span>
            </div>
            <div>${tData.content}</div>
            ${auth.currentUser.uid === tData.uid ? `<button onclick="deleteTalk('${tDoc.id}')" style="position:absolute; top:15px; right:15px; background:none; border:none; color:#ef4444; cursor:pointer; font-size:12px;">삭제</button>` : ""}
          `;
          talkList.appendChild(card);
        }
      });
    }
    window.deleteTalk = async (id) => { if(confirm("삭제할까요?")) await deleteDoc(doc(db, "talks", id)); };
    document.querySelector(".logout").onclick = () => signOut(auth);
  </script>
</body>
</html>
