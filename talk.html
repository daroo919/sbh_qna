<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>求援 - 잡담</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe);
      background-size: 400% 400%;
      animation: gradientMove 20s ease infinite;
      min-height: 100vh;
    }

    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .header {
      height: 70px;
      padding: 0 40px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      cursor: pointer;
      user-select: none;
    }

    .dot {
      color: #2563eb;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 14px;
    }

    .points {
      color: #2563eb;
      font-weight: 600;
    }

    .logout {
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.6);
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 70px);
    }

    .sidebar {
      width: 220px;
      padding-top: 20px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255, 255, 255, 0.4);
    }

    .menu-item {
      padding: 15px 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.6);
      color: #2563eb;
    }

    .main {
      flex: 1;
      padding: 30px;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }

    .input-box {
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.5);
      padding: 10px 12px;
      outline: none;
    }

    .btn-primary {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background-color: #2563eb;
      color: white;
      cursor: pointer;
    }

    /* 뱃지 스타일 */
    .user-nickname {
      display: inline-block;
      font-weight: bold;
    }

    .nick-지존::before,
    .nick-지존::after {
      content: "⭐";
      font-size: 10px;
      margin: 0 4px;
      animation: twinkle 1s infinite alternate;
    }

    @keyframes twinkle {
      from {
        opacity: 0.4;
      }

      to {
        opacity: 1;
      }
    }

    .nick-星 {
      background: linear-gradient(to right, #000000, #64748b, #000000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 1px rgba(255, 255, 255, 0.5);
    }

    .nick-火 {
      color: #ef4444;
      text-shadow: 0 0 5px rgba(239, 68, 68, 0.4);
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points">0P</div>
      <div class="nickname">불러오는 중...</div>
      <div class="logout">로그아웃</div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
    </div>
    <div class="main">
      <div class="card" style="display:flex; gap:8px;">
        <input type="text" id="talkInput" placeholder="무슨 생각을 하고 계신가요?" class="input-box" style="flex:1">
        <button id="submitTalk" class="btn-primary">등록</button>
      </div>
      <div id="talkList"></div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { collection, doc, getDoc, addDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const nicknameEl = document.querySelector(".nickname");
    const pointsEl = document.querySelector(".points");
    const talkList = document.getElementById("talkList");
    const talkInput = document.getElementById("talkInput"); // 이름 통일

    let currentUserProfile = null; // 유저 정보를 담을 변수

    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";

      // 유저 정보 가져오기 (경로 확인 필요: "users" 인지 "artifacts/appId/users" 인지)
      const snap = await getDoc(doc(db, "users", user.uid));

      if (snap.exists()) {
        currentUserProfile = snap.data();
        const myBadge = currentUserProfile.currentBadge || "";
        nicknameEl.innerText = (myBadge + " " + currentUserProfile.nickname).trim();
        pointsEl.innerText = (currentUserProfile.points || 0) + "P";
      }

      // 세션 유지된 유저 객체를 넘겨주며 로드
      loadTalks(user);
    });

    // 게시글 등록
    document.getElementById("submitTalk").onclick = async () => {
      const user = auth.currentUser;
      const content = talkInput.value.trim();

      if (!user || !content || !currentUserProfile) {
        alert("내용을 입력하거나 잠시만 기다려주세요.");
        return;
      }

      try {
        // 경로에서 'artifacts', appId 부분을 실제 사용하는 컬렉션 명으로 수정하거나 appId를 정의해야 합니다.
        // 여기서는 간단하게 "talks" 컬렉션에 바로 저장하는 예시로 수정합니다.
        await addDoc(collection(db, "talks"), {
          content: content,
          nickname: currentUserProfile.nickname,
          uid: user.uid,
          createdAt: Date.now()
        });
        talkInput.value = "";
      } catch (e) {
        console.error("Error adding document: ", e);
      }
    };

    function loadTalks(currentUser) {
      // query 경로도 등록 경로와 일치시켜야 합니다.
      const q = query(collection(db, "talks"), orderBy("createdAt", "desc"));

      onSnapshot(q, (snapshot) => {
        talkList.innerHTML = "";
        snapshot.docs.forEach(async (tDoc) => {
          const tData = tDoc.data();
          const talkId = tDoc.id;

          // 유저의 실시간 뱃지 정보를 가져오는 로직 (필요 시 유지)
          const uRef = doc(db, "users", tData.uid);
          const uSnap = await getDoc(uRef);
          const badge = (uSnap.exists() && uSnap.data().currentBadge) ? uSnap.data().currentBadge : "";
          const tClass = badge ? `nick-${badge}` : "";

          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
                <div style="margin-bottom: 12px;">
                    <span style="color:#2563eb; font-weight:bold; font-size:12px; margin-right:5px;">${badge}</span>
                    <span class="user-nickname ${tClass}">${tData.nickname}</span>
                    ${currentUser.uid === tData.uid ? `<button class="del-talk" style="float:right; background:none; border:none; color:#ef4444; cursor:pointer; font-size:12px;">삭제</button>` : ""}
                </div>
                <div style="line-height:1.6; font-size: 15px;">${tData.content}</div>
                <div class="comment-section" style="margin-top:15px; border-top:1px solid #eee; pt:10px;">
                    <div id="comments-${talkId}"></div>
                    <div class="comment-input-wrap" style="display:flex; gap:5px; margin-top:10px;">
                        <input type="text" id="commentInput-${talkId}" placeholder="댓글을 입력하세요..." class="input-box" style="flex:1; font-size:12px; padding: 6px 10px;">
                        <button class="btn-primary add-comment-btn" data-id="${talkId}" style="padding: 6px 12px; font-size:12px;">등록</button>
                    </div>
                </div>
            `;

          card.querySelector(".del-talk")?.addEventListener("click", async () => {
            if (confirm("게시글을 삭제하시겠습니까?")) await deleteDoc(doc(db, "talks", talkId));
          });

          card.querySelector(".add-comment-btn").onclick = () => addComment(talkId);

          talkList.appendChild(card);
          loadComments(talkId, currentUser);
        });
      });
    }

    async function addComment(talkId) {
      const input = document.getElementById(`commentInput-${talkId}`);
      if (!input.value.trim() || !currentUserProfile) return;

      await addDoc(collection(db, "talks", talkId, "comments"), {
        content: input.value,
        nickname: currentUserProfile.nickname,
        uid: auth.currentUser.uid,
        createdAt: Date.now()
      });
      input.value = "";
    }

    function loadComments(talkId, currentUser) {
      const q = query(collection(db, "talks", talkId, "comments"), orderBy("createdAt", "asc"));
      const container = document.getElementById(`comments-${talkId}`);

      onSnapshot(q, (snapshot) => {
        container.innerHTML = "";
        snapshot.docs.forEach((cDoc) => {
          const cData = cDoc.data();
          const item = document.createElement("div");
          item.style = "font-size:13px; margin-bottom:5px; display:flex; justify-content:space-between;";
          item.innerHTML = `
                <span><strong>${cData.nickname}</strong>: ${cData.content}</span>
                ${currentUser.uid === cData.uid ? `<span class="comment-del" style="cursor:pointer; color:red;">✕</span>` : ""}
            `;
          item.querySelector(".comment-del")?.addEventListener("click", async () => {
            await deleteDoc(doc(db, "talks", talkId, "comments", cDoc.id));
          });
          container.appendChild(item);
        });
      });
    }

    document.querySelector(".logout").onclick = () => signOut(auth).then(() => window.location.reload());
  </script>
</body>

</html>
