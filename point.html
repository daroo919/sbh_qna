<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 상점</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); background-size: 400% 400%; animation: gradientMove 20s ease infinite; min-height: 100vh; }
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.4); position: sticky; top:0; z-index:100; }
    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; padding-top: 20px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); }
    .menu-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; color: #374151; }
    .main { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; }
    .point-box { width: 100%; max-width: 600px; background: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; }
    .item-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; }
    .buy-btn { width: 100%; padding: 10px; border: none; border-radius: 10px; background: #2563eb; color: white; cursor: pointer; font-weight: bold; }
    .equip-btn { width: 100%; padding: 10px; border: 1px solid #2563eb; border-radius: 10px; background: white; color: #2563eb; cursor: pointer; margin-top: 5px; }
    .active { background: #0f172a; color: white; border: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points" id="hPoints">0P</div>
      <div class="nickname" id="hNick" style="cursor:pointer" onclick="location.href='mypage.html'">로딩...</div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
      <div class="menu-item" onclick="location.href='mypage.html'">⚙️ 마이페이지</div>
    </div>
    <div class="main">
      <div class="point-box">
        <div style="font-size: 14px; color: #64748b;">보유 포인트</div>
        <div id="mPoints" style="font-size: 40px; font-weight: 800; color: #2563eb;">0P</div>
      </div>
      <div class="shop-grid" id="grid"></div>
    </div>
  </div>
  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { doc, getDoc, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const items = [{n:'알파', p:0, i:'α'}, {n:'보석', p:500, i:'💎'}, {n:'지존', p:1000, i:'👑'}, {n:'별', p:2000, i:'𓇻'}];
    let user = null;

    onAuthStateChanged(auth, async u => {
      if(!u) return location.href="login.html";
      const s = await getDoc(doc(db, "users", u.uid));
      user = s.data(); user.uid = u.uid;
      document.getElementById("hNick").innerText = user.nickname;
      document.getElementById("hPoints").innerText = document.getElementById("mPoints").innerText = (user.points||0)+"P";
      render();
    });

    function render() {
      const g = document.getElementById("grid"); g.innerHTML = "";
      items.forEach(it => {
        const owned = (user.badges||[]).includes(it.i);
        const eq = user.currentBadge === it.i;
        g.innerHTML += `
          <div class="item-card">
            <div style="font-size:40px">${it.i}</div>
            <div style="font-weight:bold">${it.n}</div>
            <div style="color:#2563eb; margin-bottom:10px">${it.p}P</div>
            ${owned ? `<button class="equip-btn ${eq?'active':''}" onclick="window.eq('${it.i}')">${eq?'장착됨':'장착'}</button>` : `<button class="buy-btn" onclick="window.buy('${it.i}',${it.p})">구매</button>`}
          </div>`;
      });
    }
    window.buy = async (i, p) => { if(user.points < p) return alert("부족"); await updateDoc(doc(db,"users",user.uid),{points:increment(-p), badges:arrayUnion(i)}); location.reload(); };
    window.eq = async i => { await updateDoc(doc(db,"users",user.uid),{currentBadge:i}); location.reload(); };
  </script>
</body>
</html>
