<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>求援 - 포인트 상점</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #dbeafe, #f0f9ff, #e0f2fe, #c7d2fe); background-size: 400% 400%; animation: gradientMove 20s ease infinite; min-height: 100vh; }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .header { height: 70px; padding: 0 40px; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.4); position: sticky; top:0; z-index:100; }
    .logo { font-size: 24px; font-weight: 700; color: #0f172a; cursor: pointer; user-select: none; }
    .dot { color: #2563eb; }
    .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; }
    .points { color: #2563eb; font-weight: 600; }
    .layout { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 220px; padding-top: 20px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.4); }
    .menu-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; }
    .menu-item:hover { background: rgba(255, 255, 255, 0.6); color: #2563eb; }
    .main { flex: 1; padding: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    
    .item-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border-radius: 20px; padding: 25px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.4); transition: 0.3s; }
    .item-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.8); }
    .price { font-weight: bold; color: #2563eb; margin: 10px 0; }
    .buy-btn { width: 100%; padding: 10px; border: none; border-radius: 10px; background: #0f172a; color: white; cursor: pointer; font-weight: bold; }
    .buy-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

    /* 상점 뱃지 이펙트 미리보기 */
    .preview-nick { font-weight: bold; font-size: 18px; display: block; margin-bottom: 5px; }
    .nick-지존::before, .nick-지존::after { content: "⭐"; font-size: 12px; margin: 0 4px; animation: twinkle 1s infinite alternate; }
    @keyframes twinkle { from { opacity: 0.4; } to { opacity: 1; } }
    .nick-星 { background: linear-gradient(to right, #000000, #64748b, #000000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 1px rgba(255,255,255,0.3); }
    .nick-火 { color: #ef4444; text-shadow: 0 0 5px rgba(239, 68, 68, 0.4); }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo" onclick="location.href='main.html'">求援<span class="dot">.</span></div>
    <div class="header-right">
      <div class="points">0P</div>
      <div class="nickname">불러오는 중...</div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item" onclick="location.href='qna.html'">📄 문답</div>
      <div class="menu-item" onclick="location.href='talk.html'">👤 잡담</div>
      <div class="menu-item" onclick="location.href='point.html'">💰 포인트 관리</div>
    </div>
    <div class="main" id="shopList">
      <div class="item-card">
        <span class="preview-nick nick-지존">지존</span>
        <div class="price">500P</div>
        <button class="buy-btn" onclick="buyBadge('지존', 500)">구매하기</button>
      </div>
      <div class="item-card">
        <span class="preview-nick nick-星">星</span>
        <div class="price">1000P</div>
        <button class="buy-btn" onclick="buyBadge('星', 1000)">구매하기</button>
      </div>
      <div class="item-card">
        <span class="preview-nick nick-火">火</span>
        <div class="price">300P</div>
        <button class="buy-btn" onclick="buyBadge('火', 300)">구매하기</button>
      </div>
    </div>
  </div>
  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    let userPoints = 0;
    onAuthStateChanged(auth, async (user) => {
      if (!user) return window.location.href = "login.html";
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        userPoints = snap.data().points || 0;
        document.querySelector(".points").innerText = userPoints + "P";
        document.querySelector(".nickname").innerText = (snap.data().currentBadge || "") + " " + snap.data().nickname;
      }
    });

    window.buyBadge = async (name, price) => {
      if (userPoints < price) return alert("포인트가 부족합니다!");
      if (confirm(`${name} 뱃지를 구매하시겠습니까?`)) {
        const userRef = doc(db, "users", auth.currentUser.uid);
        await updateDoc(userRef, {
          points: increment(-price),
          badges: arrayUnion(name),
          currentBadge: name // 구매 즉시 장착
        });
        alert("구매 완료 및 장착되었습니다!");
        location.reload();
      }
    };
  </script>
</body>
</html>
